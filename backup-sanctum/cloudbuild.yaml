steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/the-sanctum:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/the-sanctum:latest'
      - '.'

  # Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/the-sanctum']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - the-sanctum
      - '--image=gcr.io/$PROJECT_ID/the-sanctum:$COMMIT_SHA'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production'
      # Remove stale source annotation left by the previous source-based deployment
      - '--remove-annotations=run.googleapis.com/sources'
      # Secrets are injected via Cloud Run secret manager — do NOT hardcode here.
      # In Cloud Console: Cloud Run → the-sanctum → Edit → Variables & Secrets

images:
  - 'gcr.io/$PROJECT_ID/the-sanctum:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/the-sanctum:latest'

options:
  logging: CLOUD_LOGGING_ONLY
